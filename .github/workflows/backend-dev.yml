name: (dev) [backend] Deploy to Cloudflare Workers

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/backend-dev.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Update wrangler config with environment variables
        run: |
          jq_filter='.d1_databases[0].database_id = $dbid0
          | .d1_databases[0].database_name = $dbname0
          | .d1_databases[1].database_id = $dbid1
          | .d1_databases[1].database_name = $dbname1
          | .r2_buckets[0].bucket_name = $bucketname
          | .vars.MEMBERSHIP_NUMBER_PREFIX = $mprefix
          | .vars.SMTP_HOST = $smtpHost
          | .vars.SMTP_PORT = $smtpPort
          | .vars.SMTP_USER = $smtpUser
          | .account_id = $accountId'

          jq \
            --arg dbid0 "${{ vars.MEMBERS_DB_ID }}" \
            --arg dbname0 "${{ vars.MEMBERS_DB_NAME }}" \
            --arg dbid1 "${{ vars.VMS_DB_ID }}" \
            --arg dbname1 "${{ vars.VMS_DB_NAME }}" \
            --arg bucketname "${{ vars.BUCKET_NAME }}" \
            --arg mprefix "${{ vars.MEMBERSHIP_NUMBER_PREFIX }}" \
            --arg smtpHost "${{ vars.SMTP_HOST }}" \
            --arg smtpPort "${{ vars.SMTP_PORT }}" \
            --arg smtpUser "${{ vars.SMTP_USER }}" \
            --arg accountId "${{ vars.CLOUDFLARE_ACCOUNT_ID }}" \
            "$jq_filter" \
            wrangler.jsonc > wrangler.local.jsonc

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --config wrangler.local.jsonc --name membership-app-backend-dev

      - name: Set secrets in Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.JWT_SECRET }}" | wrangler secret put JWT_SECRET --config wrangler.local.jsonc --name membership-app-backend-dev
          echo "${{ secrets.SMTP_PASS }}" | wrangler secret put SMTP_PASS --config wrangler.local.jsonc --name membership-app-backend-dev